<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title | escape }} – {% endif %}{{ site.title | escape }}</title>
<meta name="description" content="{% if page.description %}{{ page.description | escape }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description | escape }}{% endif %}">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap">

<!-- CSS -->
<link rel="stylesheet" href="{{ "/assets/css/variables.css" | fingerprint | relative_url }}">
<link rel="stylesheet" href="{{ "/assets/css/reset.css" | fingerprint | relative_url }}">
<link rel="stylesheet" href="{{ "/assets/css/typography.css" | fingerprint | relative_url }}">
<link rel="stylesheet" href="{{ "/assets/css/utilities.css" | fingerprint | relative_url }}">
<link rel="stylesheet" href="{{ "/assets/css/components.css" | fingerprint | relative_url }}">
<link rel="stylesheet" href="{{ "/assets/css/books.css" | fingerprint | relative_url }}">
<link rel="stylesheet" href="{{ "/assets/css/media-queries.css" | fingerprint | relative_url }}">

<!-- SEO -->
{% seo %}
<link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ "/feed.xml" | relative_url }}">

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">
