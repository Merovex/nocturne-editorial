{% assign author_key = include.key | default: page.author_key | default: page.slug %}
{% assign author = site.data.authors[author_key] %}
{% assign avatar = author.avatar | default: author.photo %}

{% if author and avatar %}
<figure class="text-align-center margin-block-end">
  <img src="{{ avatar | relative_url }}"
       alt="{{ author.name }}"
       class="border-radius-full object-fit-cover margin-inline-auto" width="150" height="150"
       loading="lazy">
</figure>
{% endif %}
